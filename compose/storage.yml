x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_DEFAULT_REGION: us-east-1
  AWS_ENDPOINT_URL: http://minio:9000

services:
  postgres-db:
    extends:
      file: base.yml
      service: _large
    profiles: [model-registry, airflow, quality]
    image: postgres:18-alpine3.22
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    volumes:
      - postgres_pgdata:/var/lib/postgresql/18/docker
      - ../services/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - lab-net
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
      -c max_connections=80
      -c idle_in_transaction_session_timeout=30000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      - "alloy_logs=true"

  minio:
    extends:
      file: base.yml
      service: _medium
    profiles: [model-registry, feature-store]
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9003
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lab-net
    labels:
      - "alloy_logs=true"

  minio-init:
    extends:
      file: base.yml
      service: _micro
    profiles: [model-registry, feature-store]
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set lab http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing lab/data-lake
        mc mb --ignore-existing lab/mlflow-artifacts
    networks:
      - lab-net
    restart: "no"

volumes:
  postgres_pgdata:
    name: lab-postgres-data
  minio_data:
    name: lab-minio-data

networks:
  lab-net:
    name: lab-net
    driver: bridge
