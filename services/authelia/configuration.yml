---
# Authelia Configuration — Local Development SSO
# Docs: https://www.authelia.com/configuration/

server:
  address: "tcp://0.0.0.0:9091"
  timeouts:
    read: "30s"
    write: "30s"
    idle: "120s"

log:
  level: warn

identity_validation:
  reset_password:
    jwt_secret: "a-local-dev-jwt-secret-that-is-long-enough-for-authelia"

authentication_backend:
  file:
    path: /config/users_database.yml

session:
  secret: "a-local-dev-session-secret-that-is-long-enough"
  cookies:
    - domain: "app.localhost"
      authelia_url: "https://auth.app.localhost"
      expiration: 12h
      inactivity: 1h
      default_redirection_url: "https://home.app.localhost"
    # 127.0.0.1 port-based access (ChromeOS / Crostini)
    - domain: "127.0.0.1"
      authelia_url: "https://127.0.0.1:9091"
      expiration: 12h
      inactivity: 1h
      default_redirection_url: "https://127.0.0.1:3000"

storage:
  encryption_key: "a-local-dev-encryption-key-that-must-be-at-least-20-chars"
  local:
    path: /data/db.sqlite3

notifier:
  filesystem:
    filename: /data/notification.txt

access_control:
  default_policy: one_factor

# --- OIDC Provider (for Airflow & Portainer SSO) ---
# Client secrets below must match their counterparts in:
#   - services/airflow/webserver_config.py  (OAUTH_PROVIDERS client_secret)
#   - scripts/setup_portainer_oauth.sh    (OAUTH_PAYLOAD ClientSecret)
identity_providers:
  oidc:
    hmac_secret: "a-local-dev-hmac-secret-for-oidc-jwt-signing-min-32-chars"
    jwks:
      - key: {{ secret "/config/secrets/oidc-jwks-rsa.pem" | mindent 10 "|" | msquote }}
        algorithm: "RS256"
        use: "sig"
    cors:
      endpoints:
        - "authorization"
        - "token"
        - "revocation"
        - "introspection"
        - "userinfo"
    clients:
      - client_id: "airflow"
        client_name: "Airflow"
        client_secret: "$plaintext$airflow-secret"
        authorization_policy: "one_factor"
        consent_mode: "implicit"
        # HTTP, not HTTPS: Airflow sits behind Caddy TLS termination and
        # generates this callback URL from its own scheme (http).
        redirect_uris:
          - "http://airflow.app.localhost/auth/oauth-authorized/authelia"
          - "https://127.0.0.1:8080/auth/oauth-authorized/authelia"
        scopes:
          - "openid"
          - "profile"
          - "email"
          - "groups"
        grant_types:
          - "authorization_code"
        response_types:
          - "code"
        token_endpoint_auth_method: "client_secret_basic"

      - client_id: "portainer"
        client_name: "Portainer"
        client_secret: "$plaintext$portainer-secret"
        authorization_policy: "one_factor"
        consent_mode: "implicit"
        redirect_uris:
          - "https://portainer.app.localhost"
          - "https://127.0.0.1:9000"
        scopes:
          - "openid"
          - "profile"
          - "email"
          - "groups"
        grant_types:
          - "authorization_code"
        response_types:
          - "code"
        token_endpoint_auth_method: "client_secret_basic"
