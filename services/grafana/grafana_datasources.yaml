# services/grafana/grafana_datasources.yaml

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Tempo
    type: tempo
    url: http://tempo:3200
    access: proxy
    isDefault: false

  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy
    isDefault: false
