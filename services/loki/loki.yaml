# services/loki/loki.yaml

auth_enabled: false

# ── Run as a single monolithic process — no distributed ring needed ──────────
target: all

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory # in-memory ring — never persisted, never stale after restart

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# ── Ingester: register in ring immediately, don't wait for peers ─────────────
ingester:
  lifecycler:
    join_after: 0s # join ring instantly on startup
    final_sleep: 0s # don't linger on shutdown
    num_tokens: 512
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  max_chunk_age: 2h
  chunk_idle_period: 5m
  chunk_retain_period: 30s
  chunk_target_size: 524288

# ── Query scheduler: single replica is fine, don't require a quorum ─────────
query_scheduler:
  max_outstanding_requests_per_tenant: 2048

limits_config:
  retention_period: 24h
  ingestion_rate_mb: 4
  ingestion_burst_size_mb: 8
  max_streams_per_user: 1000
  max_chunks_per_query: 2000
  allow_structured_metadata: true
  max_label_names_per_series: 15
  max_label_value_length: 2048
  unordered_writes: true

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 30m
  delete_request_store: filesystem

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 10

analytics:
  reporting_enabled: false
